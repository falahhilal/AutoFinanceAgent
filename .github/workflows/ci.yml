name: AutoFinanceAgent CI

# WHEN to run this pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# WHAT to run
jobs:
  test:
    # Use a fresh Ubuntu virtual machine hosted by GitHub
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repo's code into the virtual machine
      - name: Checkout code
        uses: actions/checkout@v3
      # Step 2: Install Python 3.11 on the virtual machine
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      # Step 3: Install your project's dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run your transaction generator
      - name: Generate transaction data
        run: python data/generate_transactions.py

      # Step 5: Run your subscription detector
      - name: Run subscription detector
        run: python utils/detect_subscriptions.py